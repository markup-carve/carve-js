name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm Trusted Publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive # spec corpus submodule; npm test needs it

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Trusted Publishing (OIDC) needs npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest

      # No NPM_TOKEN: authentication is via GitHub Actions OIDC (Trusted
      # Publishing), configured on npmjs.com for this repo + workflow.
      # Provenance is attached automatically under Trusted Publishing.
      - name: Publish to npm (Trusted Publishing)
        run: npm publish --access public
